name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Validate case packs
        run: find cases -name case.yaml -exec dirname {} \; | xargs reposcale validate
