id: plan-003
track: plan
title: Multi-language platform with manual deployment and no observability
description: >
  A platform with a Python backend, React frontend, and shell-based deployment
  scripts. No containerization, no CI/CD, no health checks, no logging
  aggregation. Backend talks to PostgreSQL directly with raw SQL.
  Deployment is a sequence of rsync commands in a bash script.
